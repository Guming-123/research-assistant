# Research Assistant 系统配置
# 各参数说明见 README.md

system:
  name: "Research Assistant"
  version: "1.0.0"
  description: "多Agent文献综述系统"

# 工作区配置
workspace:
  path: "./workspace"
  auto_save: true
  checkpoint_interval: 300
  max_checkpoints: 10

# LLM配置
llm:
  default_model: "glm-5"
  default_temperature: 0.7
  default_max_tokens: 8000
  enable_streaming: false
  timeout: 120
  retry_attempts: 3

# Embedding配置
embedding:
  model: "local-zh"             # BGE-small-zh-v1.5 本地GPU推理
  dimensions: 768               # bge-small-zh 输出维度
  batch_size: 32

# Agent配置
agents:
  coordinator:
    model: "glm-5"
    temperature: 0.3

  search:
    model: "glm-5"
    temperature: 0.3
    default_databases: ["arxiv", "pubmed", "openalex", "dblp"]
    enable_pdf_download: false
    max_concurrent_requests: 5

  screen:
    model: "glm-4-flash"   # 筛选阶段用 glm-4-flash（快速/低成本；Coding端点可用）
    temperature: 0.3
    chunk_size: 512
    chunk_overlap: 50
    default_nf_threshold: 0.64
    enable_llm_screening: true
    # 三级筛选阈值
    auto_approve_threshold: 0.71   # >= 此值自动通过，不调用LLM
    auto_reject_threshold: 0.64    # < 此值自动拒绝
    # 边界区间 [0.64, 0.71) 送LLM判定，最多50篇

  cluster:
    model: "glm-4-flash"   # 簇标签生成用 glm-4-flash（快速/低成本；Coding端点可用）
    temperature: 0.5
    method: "hdbscan"
    min_cluster_size: 6            # 论文 Table 7
    min_samples: 3                 # 论文 Table 7
    dimensionality_reduction: "pca"  # PCA降维 (GPU加速)
    n_components: 2

  summary:
    model: "glm-5"
    temperature: 0.5
    max_tokens: 32768
    max_papers_per_cluster: 10
    include_methodology: true
    include_applications: true

# 研究问题（RQ）层级配置
rq:
  enable_auto_generation: true
  default_levels: 3
  level1_questions:
    - "方法论维度"
    - "应用维度"
    - "趋势维度"

# 质量门控（全部自动模式）
quality_gates:
  post_search:
    enabled: true
    require_approval: false
  post_screen:
    enabled: true
    require_approval: false
  post_cluster:
    enabled: true
    require_approval: false
  post_summary:
    enabled: true
    require_approval: false

# 搜索配置
search:
  default_year_start: 2018
  default_year_end: 2025
  default_max_results: 200
  rate_limit_per_second: 10

# 报告配置
report:
  format: "markdown"
  language: "zh-CN"
  include_citations: true
  output_directory: "./workspace/reports"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./workspace/logs/system.log"
  max_bytes: 10485760
  backup_count: 5

# API配置
api:
  arxiv:
    base_url: "https://export.arxiv.org/api/query"
    timeout: 30
    max_retries: 1
  pubmed:
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
  dblp:
    base_url: "https://dblp.org/search/publ/api"
  openalex:
    base_url: "https://api.openalex.org"
  europe_pmc:
    base_url: "https://www.ebi.ac.uk/europepmc/webservices/rest/search"
